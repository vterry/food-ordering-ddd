services:
  db:
    image: mysql/mysql-server:latest
    container_name: catalog-db
    restart: no
    environment:
      - MYSQL_DATABASE=catalog-db
      - MYSQL_ROOT_PASSWORD=mysqlroot
      - MYSQL_ROOT_HOST=%
    ports:
      - '3306:3306'
    networks:
      - db

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: catalog-rabbitmq
    restart: no
    environment:
      - RABBITMQ_DEFAULT_USER=catalog
      - RABBITMQ_DEFAULT_PASS=catalog
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - db

networks:
  local_network:
    driver: bridge
  db:
    driver: bridge
