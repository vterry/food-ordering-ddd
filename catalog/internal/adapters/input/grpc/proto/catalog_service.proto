syntax = "proto3";

package catalog;

option go_package = "github.com/vterry/food-ordering/catalog/internal/adapters/input/grpc/pb";

service CatalogService{
  rpc ValidateRestaurantAndItems(ValidateRestaurantAndItemsRequest) returns (ValidateRestauranteAndItemsRespose);
}

message ValidateRestaurantAndItemsRequest{
  string restaurant_id = 1;
  repeated string items_id = 2;
}

message ValidateRestauranteAndItemsRespose{
  bool valid = 1;
  repeated ItemSnapshot items = 2;
  repeated string validation_errors = 3;
}

message ItemSnapshot{
  string item_id = 1;
  string name = 2;
  int64 price_cents = 3;
}