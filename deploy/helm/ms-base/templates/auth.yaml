{{- if .Values.auth.enabled }}
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ .Release.Name }}-jwt
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  jwtRules:
  - issuer: {{ .Values.auth.jwt.issuer | quote }}
    jwksUri: {{ .Values.auth.jwt.jwksUri | quote }}
    forwardOriginalToken: true
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Release.Name }}-authz
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  action: ALLOW
  rules:
  - from:
    - source:
        requestPrincipals: ["*"]
{{- end }}
