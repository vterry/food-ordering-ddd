version: "2"
sql:
  - schema: "internal/adapters/db/migrations/"
    queries: "internal/adapters/db/queries/"
    engine: "mysql"
    gen:
      go:
        package: "sqlc"
        out: "internal/adapters/db/sqlc"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
        emit_db_tags: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        overrides:
          - db_type: "decimal"
            go_type: "float64"
